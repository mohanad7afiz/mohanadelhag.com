name: Generate Blog Post

on:
  schedule:
    - cron: "0 9 */2 * *" # Every 2 days at 09:00 UTC
  workflow_dispatch:
    inputs:
      topic_hint:
        description: "Optional topic hint for the blog post"
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: scripts/blog-generator/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: scripts/blog-generator
        run: pnpm install

      - name: Generate blog post
        working-directory: scripts/blog-generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          TOPIC_HINT: ${{ inputs.topic_hint || '' }}
          SITE_URL: "https://mohanadelhag.dev"
        run: npx tsx index.ts

      - name: Stage new posts, images, and LinkedIn output
        run: |
          git add src/content/blog/*.mdx
          git add public/blog/*.jpg || true
          git add scripts/blog-generator/output/linkedin/*.md || true

      - name: Check for changes
        id: check
        run: |
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "$(cat <<'EOF'
          Add auto-generated blog post and LinkedIn summary
          EOF
          )"
          git push
